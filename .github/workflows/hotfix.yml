name: Hotfix Release

# Publishes a patch release from a release/vX.Y.x branch.
# Auto-increments PATCH: finds highest existing vX.Y.Z tag, creates vX.Y.(Z+1).
#
# Must be run on a release/vX.Y.x branch, not on main.
#
# Typical flow:
#   1. Run "Create Release Branch" to create release/v1.2.x from modu-core-v1.2.0
#   2. Cherry-pick or develop the fix on that branch (PR or direct push)
#   3. Run this workflow on release/v1.2.x
#   4. Result: modu-core-v1.2.1 tag + GitHub Release with binary and .deb

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — compute tag but do not publish'
        type: boolean
        default: false

jobs:
  hotfix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/prze-kiesz/modu-core:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch
        run: |
          BRANCH="${{ github.ref_name }}"
          if [[ ! "$BRANCH" =~ ^release/v[0-9]+\.[0-9]+\.x$ ]]; then
            echo "::error::This workflow must run on a release/vX.Y.x branch. Current branch: ${BRANCH}"
            exit 1
          fi

      - name: Compute hotfix tag
        id: version
        run: |
          set -euo pipefail

          BRANCH="${{ github.ref_name }}"           # release/v1.2.x
          VERSION_PART="${BRANCH#release/v}"        # 1.2.x
          MAJOR=$(echo "$VERSION_PART" | cut -d. -f1)
          MINOR=$(echo "$VERSION_PART" | cut -d. -f2)
          PREFIX="modu-core-v"

          # Find highest PATCH already released for this MAJOR.MINOR (Z > 0 or Z = 0)
          HIGHEST_PATCH=$(git tag -l "${PREFIX}${MAJOR}.${MINOR}.*" \
            | grep -E "^${PREFIX}[0-9]+\.[0-9]+\.[0-9]+$" \
            | awk -F. '{print $3}' | sort -n | tail -1)

          NEXT_PATCH=$(( ${HIGHEST_PATCH:-0} + 1 ))
          TAG="${PREFIX}${MAJOR}.${MINOR}.${NEXT_PATCH}"
          VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"

          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "### Hotfix tag: \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: |
          cmake -S . -B build-hotfix \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DCMAKE_PROJECT_VERSION="${{ steps.version.outputs.version }}"
          cmake --build build-hotfix -j$(nproc)

      - name: Package (.deb)
        run: |
          cd build-hotfix
          cpack --config CPackConfig.cmake

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Hotfix release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DEB=$(ls build-hotfix/*.deb)

          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            --prerelease=false \
            "build-hotfix/main/modu-core#modu-core-binary" \
            "${DEB}#Debian package"
