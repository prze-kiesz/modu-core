name: Release

# User-triggered release workflow.
# Auto-increments MINOR from the VERSION file, creates a release tag
# modu-core-v<MAJOR>.<MINOR+1>.0, builds the binary and .deb package,
# and publishes a GitHub Release with artifacts and auto-generated changelog.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — compute tag but do not publish'
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push tags and create GitHub Release
    container:
      image: ghcr.io/prze-kiesz/modu-core:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release tag
        id: version
        run: |
          set -euo pipefail

          BASE_VERSION=$(cat VERSION | tr -d '[:space:]')
          MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
          PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)
          PREFIX="modu-core-v"

          # Find the highest MINOR already released for this MAJOR (with PATCH=0)
          HIGHEST_MINOR=$(git tag -l "${PREFIX}${MAJOR}.*.${PATCH}" \
            | grep -E "^${PREFIX}[0-9]+\.[0-9]+\.[0-9]+$" \
            | awk -F. '{print $2}' | sort -n | tail -1)

          NEXT_MINOR=$(( ${HIGHEST_MINOR:-0} + 1 ))
          TAG="${PREFIX}${MAJOR}.${NEXT_MINOR}.${PATCH}"
          PREV_TAG="${PREFIX}${MAJOR}.${HIGHEST_MINOR:-0}.${PATCH}"

          echo "tag=${TAG}"                >> "$GITHUB_OUTPUT"
          echo "version=${MAJOR}.${NEXT_MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "prev_tag=${PREV_TAG}"      >> "$GITHUB_OUTPUT"
          echo "### Release tag: \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Build
        run: |
          cmake -S . -B build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DCMAKE_PROJECT_VERSION="${{ steps.version.outputs.version }}"
          cmake --build build-release -j$(nproc)

      - name: Package (.deb)
        run: |
          cd build-release
          cpack --config CPackConfig.cmake

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" \
            -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="${{ steps.version.outputs.prev_tag }}"
          DEB=$(ls build-release/*.deb)

          # If previous release tag exists, use it as the start of changelog
          NOTES_ARGS=""
          if git rev-parse "${PREV_TAG}" >/dev/null 2>&1; then
            NOTES_ARGS="--notes-start-tag ${PREV_TAG}"
          fi

          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            ${NOTES_ARGS} \
            "build-release/main/modu-core#modu-core-binary" \
            "${DEB}#Debian package"
