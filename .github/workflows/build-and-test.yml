name: Build and Test

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - '.devcontainer/**'
      - 'LICENSE'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - '.devcontainer/**'
      - 'LICENSE'
  # Run after Docker image is built (when triggered by Docker workflow completion)
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only run if Docker build succeeded
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    container:
      image: ghcr.io/prze-kiesz/modu-core:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
      options: --user root
    
    strategy:
      matrix:
        build_type: [Debug, Release]
    
    env:
      CC: gcc
      CXX: g++
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DBUILD_TESTING=ON \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --verbose

      - name: Run acceptance tests (pytest)
        run: |
          pytest L0_AcceptanceTests/test_pytest/ \
            -v --tb=short \
            --junitxml=pytest-results-${{ matrix.build_type }}.xml
        env:
          MODU_CORE_BINARY: ${{ github.workspace }}/build/main/modu-core

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.build_type }}
          path: |
            build/Testing/Temporary/LastTest.log
            build/Testing/Temporary/LastTestsFailed.log
            pytest-results-${{ matrix.build_type }}.xml
          if-no-files-found: ignore

      - name: Upload build artifacts
        if: matrix.build_type == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: modu-core-${{ matrix.build_type }}-${{ github.sha }}
          path: |
            build/main/modu-core
            build/main/*/unit_test/*_unittest
          retention-days: 7

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Summary (${{ matrix.build_type }})" >> $GITHUB_STEP_SUMMARY

          echo "### Unit / Integration (ctest)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cd build && ctest --verbose 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY && cd ..
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo "### Acceptance tests (pytest)" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          if [ -f pytest-results-${{ matrix.build_type }}.xml ]; then
            echo "Results saved in pytest-results-${{ matrix.build_type }}.xml" >> $GITHUB_STEP_SUMMARY
          fi
          pytest L0_AcceptanceTests/test_pytest/ -v --tb=short 2>&1 | tail -30 >> $GITHUB_STEP_SUMMARY || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
        env:
          MODU_CORE_BINARY: ${{ github.workspace }}/build/main/modu-core
